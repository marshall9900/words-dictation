name: words_dictation_v2
description: Words Dictation v2 - 小学生单词听写工具（Phase 1：动态绘本）
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  get: ^4.6.6
  
  # Network
  dio: ^5.4.0
  
  # Audio
  audioplayers: ^5.2.1
  just_audio: ^0.9.36
  
  # Cache
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  
  # Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  
  # UI
  lottie: ^2.7.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  
  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
